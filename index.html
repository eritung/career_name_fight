<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>辦公室職場決鬥場</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');
:root{
  --bg:#f0ebe0;--bg2:#e8e2d4;--bg3:#ddd6c4;
  --ink:#1a1a1a;--ink2:#333;--muted:#888;
  --yellow:#ffe566;--yellow2:#ffd700;--yellow3:#ffec8a;
  --pink:#ffb3c6;--blue:#b3d4ff;--green:#b3ffcc;--orange:#ffd9b3;
  --p1:#5b4fcf;--p1l:#8b7fe8;--p2:#c0392b;--p2l:#e05050;
  --border:rgba(0,0,0,0.1);
  --shadow:0 2px 8px rgba(0,0,0,0.08);
  --eng:#5b4fcf;--des:#e91e8c;--pm:#e67e22;--biz:#27ae60;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Noto Sans TC',sans-serif;
  background:var(--bg);
  color:var(--ink);
  min-height:100vh;
  padding:2rem 1rem 4rem;
  background-image:
    repeating-linear-gradient(0deg,transparent,transparent 27px,rgba(180,200,255,0.15) 27px,rgba(180,200,255,0.15) 28px),
    repeating-linear-gradient(90deg,transparent,transparent 27px,rgba(180,200,255,0.08) 27px,rgba(180,200,255,0.08) 28px);
}

/* ── 標題 ── */
.page-header{text-align:center;margin-bottom:2rem;position:relative;}
.page-header h1{font-size:clamp(1.6rem,4vw,2.6rem);font-weight:900;color:var(--ink);letter-spacing:0.05em;line-height:1.2;}
.page-header h1 .highlight{background:var(--yellow);padding:0 6px;border-radius:2px;transform:rotate(-1deg);display:inline-block;}
.page-header .subtitle{font-size:12px;color:var(--muted);margin-top:8px;letter-spacing:0.1em;}
.hint{font-size:11px;color:var(--muted);margin-top:10px;}

/* ── 便利貼裝飾 ── */
.sticky{
  display:inline-block;padding:6px 12px;border-radius:2px;font-size:11px;font-weight:700;
  transform:rotate(-2deg);box-shadow:2px 3px 6px rgba(0,0,0,0.15);letter-spacing:0.05em;
}
.sticky-y{background:var(--yellow);color:var(--ink);}
.sticky-p{background:var(--pink);color:var(--ink);}
.sticky-b{background:var(--blue);color:var(--ink);}
.sticky-g{background:var(--green);color:var(--ink);}
.sticky-o{background:var(--orange);color:var(--ink);}

/* ── Layout ── */
.page-wrap{display:flex;gap:1.5rem;align-items:flex-start;max-width:1160px;margin:0 auto;}
.main-col{flex:1;min-width:0;}
.side-col{width:260px;flex-shrink:0;position:sticky;top:1.5rem;}

/* ── 結果橫幅 ── */
.result-banner{
  margin-bottom:1.5rem;
  background:var(--yellow);border:2px solid var(--yellow2);border-radius:4px;
  padding:1.5rem;text-align:center;display:none;
  box-shadow:var(--shadow);transform:rotate(-0.3deg);
}
.result-banner.show{display:block;}
.result-banner-title{font-size:clamp(1.4rem,4vw,2rem);font-weight:900;color:var(--ink);letter-spacing:0.1em;margin-bottom:6px;}
.result-banner-sub{font-size:13px;color:var(--ink2);}

/* ── 部門卡 ── */
.dept-section{display:grid;grid-template-columns:1fr 56px 1fr;gap:1rem;margin-bottom:1.5rem;}
.dept-card{background:#fff;border:1.5px solid var(--border);border-radius:4px;padding:1rem 1.25rem;min-height:70px;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow);}
.dept-icon{font-size:24px;flex-shrink:0;}
.dept-name{font-size:13px;font-weight:700;margin-bottom:3px;}
.dept-desc{font-size:11px;color:var(--muted);}
.dept-card.eng{border-left:4px solid var(--eng);}
.dept-card.des{border-left:4px solid var(--des);}
.dept-card.pm{border-left:4px solid var(--pm);}
.dept-card.biz{border-left:4px solid var(--biz);}
.dept-card.eng .dept-name{color:var(--eng);}
.dept-card.des .dept-name{color:var(--des);}
.dept-card.pm .dept-name{color:var(--pm);}
.dept-card.biz .dept-name{color:var(--biz);}
.dept-placeholder{color:var(--muted);font-size:11px;font-style:italic;}
.dept-col{display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--muted);letter-spacing:0.1em;}

/* ── 戰士卡 ── */
.fighters{display:grid;grid-template-columns:1fr 56px 1fr;gap:1rem;align-items:start;margin-bottom:1.5rem;}
.fighter-card{
  background:#fff;border:1.5px solid var(--border);border-radius:4px;
  padding:1.5rem 1.25rem 1.25rem;position:relative;
  box-shadow:3px 3px 10px rgba(0,0,0,0.07);
}
.fighter-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;border-radius:4px 4px 0 0;}
.fighter-card.p1::before{background:var(--p1l);}
.fighter-card.p2::before{background:var(--p2l);}
.fighter-card.winner{border-color:var(--yellow2);background:#fffde8;box-shadow:0 0 16px rgba(255,215,0,0.3);}
.fighter-card.collapse-p1,.fighter-card.collapse-p2{border-color:#e74c3c;box-shadow:0 0 12px rgba(231,76,60,0.2);}

.avatar{
  width:52px;height:52px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;font-weight:900;
  margin:0 auto 10px;
  border:2px solid var(--border);
  background:var(--bg);
}
.p1 .avatar{background:#eeedfb;border-color:rgba(91,79,207,0.3);color:var(--p1);}
.p2 .avatar{background:#fbeeed;border-color:rgba(192,57,43,0.3);color:var(--p2);}

/* Name input */
.name-input-wrap{position:relative;margin-bottom:1rem;}
.name-input-label{display:block;font-size:10px;color:var(--muted);letter-spacing:0.2em;text-align:center;margin-bottom:6px;font-weight:700;}
.name-input{
  width:100%;
  background:var(--yellow3);
  border:2px solid var(--yellow2);border-radius:3px;
  color:var(--ink);font-size:18px;font-weight:700;
  text-align:center;letter-spacing:0.1em;
  padding:10px 8px;outline:none;
  transition:border-color 0.2s,box-shadow 0.2s;
  box-shadow:inset 0 1px 3px rgba(0,0,0,0.05);
}
.name-input:focus{border-color:var(--yellow2);box-shadow:0 0 0 3px rgba(255,215,0,0.25);}
.name-input::placeholder{color:rgba(0,0,0,0.3);font-weight:400;font-size:14px;}

/* HP */
.hp-section{margin-bottom:1rem;}
.hp-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px;}
.hp-top span:first-child{font-size:10px;color:var(--muted);letter-spacing:0.15em;font-weight:700;}
.hp-top span:last-child{font-size:13px;font-weight:700;color:var(--ink);}
.hp-track{height:8px;background:var(--bg2);border-radius:4px;overflow:hidden;border:1px solid var(--border);}
.hp-fill{height:100%;border-radius:4px;transition:width 0.5s ease;}
.p1 .hp-fill{background:linear-gradient(90deg,var(--p1),var(--p1l));}
.p2 .hp-fill{background:linear-gradient(90deg,var(--p2),var(--p2l));}

/* Stats */
.stats{margin-bottom:1rem;}
.stat-row{display:flex;align-items:center;gap:8px;margin:5px 0;}
.stat-label{font-size:10px;color:var(--muted);letter-spacing:0.05em;width:32px;flex-shrink:0;font-weight:700;}
.stat-track{flex:1;height:5px;background:var(--bg2);border-radius:3px;overflow:hidden;}
.stat-fill{height:100%;border-radius:3px;transition:width 0.4s ease;}
.p1 .stat-fill{background:var(--p1l);}
.p2 .stat-fill{background:var(--p2l);}
.stat-val{font-size:12px;font-weight:700;color:var(--ink2);width:26px;text-align:right;flex-shrink:0;}

/* Tags */
.tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:1rem;}
.tag{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:700;border:1.5px solid;}
.tag-eng{background:#eeedfb;color:var(--eng);border-color:rgba(91,79,207,0.3);}
.tag-des{background:#fde8f4;color:var(--des);border-color:rgba(233,30,140,0.3);}
.tag-pm{background:#fef3e8;color:var(--pm);border-color:rgba(230,126,34,0.3);}
.tag-biz{background:#e8f8ee;color:var(--biz);border-color:rgba(39,174,96,0.3);}
.tag-neutral{background:var(--bg2);color:var(--muted);border-color:var(--border);}

/* Skills */
.skill-section{border-top:2px dashed var(--border);padding-top:10px;}
.skill-section-title{font-size:10px;color:var(--muted);letter-spacing:0.2em;margin-bottom:8px;font-weight:700;}
.skill-item{background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:8px 10px;margin-bottom:6px;position:relative;}
.skill-item::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:4px 0 0 4px;}
.skill-item.atk-skill::before{background:var(--p2l);}
.skill-item.def-skill::before{background:var(--p1l);}
.skill-item.spd-skill::before{background:var(--biz);}
.skill-item.ult-skill::before{background:var(--yellow2);}
.skill-name-row{display:flex;align-items:center;gap:6px;margin-bottom:3px;flex-wrap:wrap;}
.skill-name{font-size:13px;font-weight:700;color:var(--ink);}
.skill-badge{font-size:9px;padding:1px 6px;border-radius:20px;font-weight:700;border:1.5px solid;}
.badge-atk{background:#fbeeed;color:var(--p2);border-color:rgba(192,57,43,0.3);}
.badge-def{background:#eeedfb;color:var(--p1);border-color:rgba(91,79,207,0.3);}
.badge-spd{background:#e8f8ee;color:var(--biz);border-color:rgba(39,174,96,0.3);}
.badge-ult{background:var(--yellow);color:var(--ink);border-color:var(--yellow2);}
.skill-desc{font-size:11px;color:var(--muted);}
.skill-cd{font-size:9px;color:var(--muted);font-weight:700;}

/* VS col */
.vs-col{display:flex;flex-direction:column;align-items:center;justify-content:center;padding-top:3.5rem;gap:10px;}
.vs-text{font-size:22px;font-weight:900;color:var(--ink);letter-spacing:0.1em;background:var(--yellow);padding:4px 10px;border-radius:4px;transform:rotate(-2deg);box-shadow:2px 2px 6px rgba(0,0,0,0.1);}
.vs-dot{width:4px;height:4px;border-radius:50%;background:var(--border);}

/* Fight button */
.fight-btn{
  display:block;width:100%;padding:14px;
  font-size:16px;font-weight:900;letter-spacing:0.2em;
  color:var(--ink);background:var(--yellow);
  border:2px solid var(--yellow2);border-radius:4px;
  cursor:pointer;transition:background 0.15s,transform 0.1s;
  margin-bottom:1.25rem;
  box-shadow:3px 3px 0 var(--yellow2);
}
.fight-btn:hover{background:var(--yellow2);}
.fight-btn:active{transform:translate(2px,2px);box-shadow:1px 1px 0 var(--yellow2);}
.fight-btn:disabled{background:var(--bg2);color:var(--muted);cursor:not-allowed;box-shadow:none;border-color:var(--border);}

/* Sidebar */
.battle-status{
  background:#fff;border:1.5px solid var(--border);border-radius:4px;
  padding:1.25rem 1rem;display:flex;flex-direction:column;gap:1rem;
  box-shadow:var(--shadow);
}
.status-label{font-size:10px;color:var(--muted);letter-spacing:0.2em;text-align:center;font-weight:700;}
.status-vs{font-size:14px;font-weight:900;color:var(--ink);text-align:center;padding:2px 0;}
.status-divider{height:2px;background:repeating-linear-gradient(90deg,var(--yellow) 0,var(--yellow) 6px,transparent 6px,transparent 10px);}
.status-fighter{display:flex;flex-direction:column;gap:5px;}
.status-name{font-size:13px;font-weight:700;}
.status-name.p1c{color:var(--p1);}
.status-name.p2c{color:var(--p2);}
.status-hp-row{display:flex;align-items:center;gap:6px;}
.status-hp-track{flex:1;height:7px;background:var(--bg2);border-radius:4px;overflow:hidden;border:1px solid var(--border);}
.status-hp-fill{height:100%;border-radius:4px;transition:width 0.5s ease;}
.status-hp-fill.p1f{background:var(--p1l);}
.status-hp-fill.p2f{background:var(--p2l);}
.status-hp-val{font-size:12px;font-weight:700;color:var(--ink2);min-width:30px;text-align:right;}
.status-round{font-size:11px;color:var(--muted);letter-spacing:0.1em;text-align:center;font-weight:700;}
.status-collapse{font-size:11px;color:#e74c3c;font-weight:700;text-align:center;}

/* Battle Log */
.battle-log{background:transparent;padding:0;min-height:60px;max-height:420px;overflow-y:auto;font-size:12px;line-height:1.85;scrollbar-width:thin;scrollbar-color:rgba(0,0,0,0.15) transparent;}
.battle-log::-webkit-scrollbar{width:3px;}
.battle-log::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.15);border-radius:2px;}
.log-atk{color:var(--ink2);}
.log-skill-p1{color:var(--p1);font-weight:500;}
.log-skill-p2{color:var(--p2);font-weight:500;}
.log-event{color:#e67e22;font-weight:700;}
.log-miss{color:var(--muted);font-style:italic;}
.log-fate{color:#8b6914;font-style:italic;}
.log-sep{color:var(--muted);}
.log-collapse{color:#e67e22;font-weight:700;}
.log-revenge{color:#e74c3c;font-weight:700;}
.log-revive{color:var(--p1);font-weight:700;}
.log-boss{color:#8b6914;font-weight:700;}

/* Collapse */
.collapse-badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:20px;background:#fbeeed;color:#e74c3c;border:1.5px solid rgba(231,76,60,0.3);margin-top:6px;font-weight:700;}

@media(max-width:720px){
  .page-wrap{flex-direction:column;}
  .side-col{width:100%;position:static;}
  .fighters,.dept-section{grid-template-columns:1fr;}
  .vs-col,.dept-col{flex-direction:row;padding-top:0;padding:0.5rem 0;}
}
</style>
</head>
<body>

<div class="page-header">
  <h1>🏢 <span class="highlight">辦公室</span> 職場決鬥場</h1>
  <div style="margin-top:12px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap;">
    <span class="sticky sticky-y" style="transform:rotate(-3deg)">截止日爆炸中</span>
    <span class="sticky sticky-p" style="transform:rotate(2deg)">會議又開了</span>
    <span class="sticky sticky-b" style="transform:rotate(-1deg)">demo呢？</span>
    <span class="sticky sticky-g" style="transform:rotate(3deg)">改需求ing</span>
  </div>
  <div class="subtitle" style="margin-top:12px;">以名字決定職場戰鬥力，向無理需求宣戰</div>
  <div class="hint">✦ 在下方輸入兩位同事的名字，開始決鬥 ✦</div>
</div>

<div class="page-wrap">
<div class="main-col">

  <div class="result-banner" id="resultBanner">
    <div class="result-banner-title" id="resultTitle"></div>
    <div class="result-banner-sub" id="resultSub"></div>
  </div>

  <!-- 部門區 -->
  <div class="dept-section">
    <div class="dept-card" id="dept1"><span class="dept-placeholder">部門將於開戰前揭曉</span></div>
    <div class="dept-col">部門</div>
    <div class="dept-card" id="dept2"><span class="dept-placeholder">部門將於開戰前揭曉</span></div>
  </div>

  <div class="fighters">
    <div class="fighter-card p1" id="card1">
      <div class="avatar" id="av1">？</div>
      <div class="name-input-wrap">
        <label class="name-input-label">✏️ 輸入同事名字</label>
        <input class="name-input" id="name1" type="text" placeholder="輸入名字" maxlength="10" value="小美" oninput="updateCard(1)"/>
      </div>
      <div class="hp-section">
        <div class="hp-top"><span>體力值</span><span id="hp1-val">—</span></div>
        <div class="hp-track"><div class="hp-fill" id="hp1-bar" style="width:100%"></div></div>
      </div>
      <div class="stats">
        <div class="stat-row"><span class="stat-label">攻擊</span><div class="stat-track"><div class="stat-fill" id="atk1-bar"></div></div><span class="stat-val" id="atk1">-</span></div>
        <div class="stat-row"><span class="stat-label">防禦</span><div class="stat-track"><div class="stat-fill" id="def1-bar"></div></div><span class="stat-val" id="def1">-</span></div>
        <div class="stat-row"><span class="stat-label">速度</span><div class="stat-track"><div class="stat-fill" id="spd1-bar"></div></div><span class="stat-val" id="spd1">-</span></div>
        <div class="stat-row"><span class="stat-label">耐壓</span><div class="stat-track"><div class="stat-fill" id="lck1-bar"></div></div><span class="stat-val" id="lck1">-</span></div>
      </div>
      <div class="tags" id="tags1"></div>
      <div class="skill-section">
        <div class="skill-section-title">📋 職場技能</div>
        <div id="skills1"></div>
      </div>
    </div>
    <div class="vs-col"><div class="vs-dot"></div><div class="vs-text">VS</div><div class="vs-dot"></div></div>
    <div class="fighter-card p2" id="card2">
      <div class="avatar" id="av2">？</div>
      <div class="name-input-wrap">
        <label class="name-input-label">✏️ 輸入同事名字</label>
        <input class="name-input" id="name2" type="text" placeholder="輸入名字" maxlength="10" value="小志" oninput="updateCard(2)"/>
      </div>
      <div class="hp-section">
        <div class="hp-top"><span>體力值</span><span id="hp2-val">—</span></div>
        <div class="hp-track"><div class="hp-fill" id="hp2-bar" style="width:100%"></div></div>
      </div>
      <div class="stats">
        <div class="stat-row"><span class="stat-label">攻擊</span><div class="stat-track"><div class="stat-fill" id="atk2-bar"></div></div><span class="stat-val" id="atk2">-</span></div>
        <div class="stat-row"><span class="stat-label">防禦</span><div class="stat-track"><div class="stat-fill" id="def2-bar"></div></div><span class="stat-val" id="def2">-</span></div>
        <div class="stat-row"><span class="stat-label">速度</span><div class="stat-track"><div class="stat-fill" id="spd2-bar"></div></div><span class="stat-val" id="spd2">-</span></div>
        <div class="stat-row"><span class="stat-label">耐壓</span><div class="stat-track"><div class="stat-fill" id="lck2-bar"></div></div><span class="stat-val" id="lck2">-</span></div>
      </div>
      <div class="tags" id="tags2"></div>
      <div class="skill-section">
        <div class="skill-section-title">📋 職場技能</div>
        <div id="skills2"></div>
      </div>
    </div>
  </div>

  <button class="fight-btn" id="fightBtn" onclick="startBattle()">🥊 開始職場決鬥！</button>

</div><!-- /main-col -->

<div class="side-col">
  <div class="battle-status">
    <div class="status-label">📊 即時戰況</div>
    <div class="status-fighter">
      <div class="status-name p1c" id="sn1">—</div>
      <div class="status-hp-row">
        <div class="status-hp-track"><div class="status-hp-fill p1f" id="shp1-bar" style="width:100%"></div></div>
        <div class="status-hp-val" id="shp1">—</div>
      </div>
    </div>
    <div class="status-vs">⚔️ VS ⚔️</div>
    <div class="status-fighter">
      <div class="status-name p2c" id="sn2">—</div>
      <div class="status-hp-row">
        <div class="status-hp-track"><div class="status-hp-fill p2f" id="shp2-bar" style="width:100%"></div></div>
        <div class="status-hp-val" id="shp2">—</div>
      </div>
    </div>
    <div class="status-divider"></div>
    <div class="status-round" id="sRound">等待開戰...</div>
    <div class="status-collapse" id="sCollapse"></div>
    <div class="battle-log" id="log"></div>
  </div>
</div>
</div><!-- /page-wrap -->

<script>
// ── 職場屬性：字的特性決定 ──
// 工程師(eng)：筆畫多、理性
// 設計師(des)：含特定字、感性
// PM：字數多、協調
// 業務(biz)：字少、外向

// ── 動態職業系統：根據名字特性生成職稱 ──
// 筆畫總數、字數、特定字組合決定職業類型（共 12 種），不限死

const JOB_TABLE=[

function assignJob(name){
  const chars=[...name];
  // 第一輪：完整字比對
  const scores={};
  for(const ch of chars){
    const key=CHAR_JOB_MAP[ch];
    if(key) scores[key]=(scores[key]||0)+2;
  }
  // 第二輪：英文名字按首字母聲響分類
  const lname=name.toLowerCase();
  if([...lname].every(c=>/[a-z\s]/.test(c))){
    const hard='bcdfgkpqrstvxz';
    const soft='aehijlmnouwy';
    const hardCount=[...lname].filter(c=>hard.includes(c)).length;
    const softCount=[...lname].filter(c=>soft.includes(c)).length;
    const len=name.length;
    if(len<=4) scores['rider']=(scores['rider']||0)+1;
    if(len>=8) scores['professor']=(scores['professor']||0)+1;
    if(hardCount>softCount) scores['mechanic']=(scores['mechanic']||0)+1;
    else scores['musician']=(scores['musician']||0)+1;
    // 英文名首字母對應職業
    const firstLetterMap={a:'actor',b:'banker',c:'chef',d:'datascience',e:'engineer',
      f:'freelance',g:'trainer',h:'hr',i:'intern',j:'journalist',k:'creator',
      l:'lawyer',m:'musician',n:'cs',o:'ops',p:'pm',q:'professor',
      r:'realtor',s:'sales',t:'teacher',u:'youtuber',v:'actor',
      w:'writer',x:'exec',y:'youtuber',z:'contractor'};
    const first=firstLetterMap[lname[0]];
    if(first) scores[first]=(scores[first]||0)+2;
  }
  // 有命中就取最高分
  if(Object.keys(scores).length>0){
    const best=Object.entries(scores).sort((a,b)=>b[1]-a[1])[0][0];
    const job=DEPT_MAP[best];
    if(job) return job;
  }
  // 退回：筆畫邏輯
  const total=chars.reduce((a,c)=>a+getCJKStrokes(c),0);
  const len=chars.length;
  return JOB_TABLE[(total*3+len*7)%JOB_TABLE.length];
}

function getCJKStrokes(ch){
  const T={'一':1,'二':2,'三':3,'口':3,'山':3,'土':3,'大':3,'女':3,'小':3,'子':3,'工':3,'才':3,'火':4,'木':4,'水':4,'心':4,'王':4,'天':4,'五':4,'六':4,'中':4,'不':4,'方':4,'文':4,'石':5,'生':5,'用':5,'白':5,'目':5,'北':5,'平':5,'正':5,'主':5,'有':6,'光':6,'名':6,'成':6,'地':6,'江':6,'百':6,'全':6,'回':6,'好':6,'安':6,'志':7,'李':7,'林':7,'武':7,'男':7,'秀':7,'良':7,'見':7,'里':7,'周':8,'奇':8,'明':8,'昌':8,'炎':8,'直':8,'金':8,'青':8,'亮':9,'信':9,'南':9,'風':9,'城':9,'俊':9,'春':9,'柳':9,'相':9,'美':9,'侯':9,'建':9,'政':9,'原':10,'海':10,'曹':10,'峰':10,'真':10,'孫':10,'國':11,'強':11,'深':11,'清':11,'理':11,'彩':11,'勝':12,'博':12,'葛':12,'業':13,'義':13,'楓':13,'源':13,'聖':13,'嘉':14,'瑜':14,'銘':14,'維':14,'福':14,'寧':14,'德':15,'諸':15,'廣':15,'樂':15,'賢':15,'輝':15,'操':16};
  if(T[ch])return T[ch];
  const cp=ch.codePointAt(0);
  if(cp>=0x4E00&&cp<=0x9FFF)return((cp-0x4E00)%15)+3;
  if(ch>='A'&&ch<='Z')return ch.charCodeAt(0)-64;
  if(ch>='a'&&ch<='z')return ch.charCodeAt(0)-96;
  return 4;
}

function pickWord(arr,seed){return arr[seed%arr.length];}

function getNameVal(name){
  return [...name].reduce((a,ch)=>a+getCJKStrokes(ch),0);
}

function generateSkills(name,job,nameVal,chars){
  const seed1=nameVal, seed2=chars.length*7+nameVal%5;
  const skA=pickWord(job.skills_a,seed1);
  const skB=pickWord(job.skills_b,seed2);
  const ult=pickWord(job.ult,(seed1+seed2)%4);
  return [
    {name:skA, type:job.type_a, mult:job.type_a==='atk'?1.5:0, miss:job.miss_a, desc:skillDescOffice(job.type_a,skA), badge:job.type_a==='atk'?'atk':job.type_a==='def'?'def':'spd', skillCls:job.type_a==='atk'?'atk-skill':'spd-skill'},
    {name:skB, type:job.type_b, mult:job.type_b==='atk'?1.4:0, miss:job.miss_b, desc:skillDescOffice(job.type_b,skB), badge:job.type_b==='atk'?'atk':job.type_b==='def'?'def':'spd', skillCls:job.type_b==='def'?'def-skill':job.type_b==='debuff'?'spd-skill':'atk-skill'},
    {name:`${name}${ult}`, type:'ult', mult:2.2, miss:0.22, desc:`使出職場終極技，${name} 的威名震動全場`, badge:'ult', skillCls:'ult-skill', cooldown:3},
  ];
}

function skillDescOffice(type,word){
  if(type==='atk')    return `「${word}」— 精準打擊，對手精神受損`;
  if(type==='def')    return `「${word}」— 成功防禦，子彈飛一會兒`;
  if(type==='debuff') return `「${word}」— 對手速度大幅下降`;
  return `「${word}」— 全力出擊`;
}

function calcStats(name){
  if(!name)return null;
  const chars=[...name];
  const nameVal=getNameVal(name);
  const charCount=chars.length;
  const job=assignJob(name);
  const b={atk:job.atkBonus||0,def:job.defBonus||0,spd:job.spdBonus||0,lck:job.lckBonus||0};
  const atkMalus=job.atkMalus||0;
  const atk=Math.min(99,Math.round((nameVal*3+charCount*8)%60+25+b.atk-atkMalus));
  const def=Math.min(99,Math.round((nameVal*2+charCount*5)%50+20+b.def));
  const spd=Math.min(99,Math.round(100-nameVal*1.5%40+charCount*4+b.spd));
  const lck=Math.min(99,Math.round((nameVal+charCount*7)%40+15+b.lck));
  const maxHp=80+nameVal*2+charCount*10;
  const skills=generateSkills(name,job,nameVal,chars);
  return{atk,def,spd,lck,maxHp,dept:job.key,job,elements:[job.key],name,chars,nameVal,charCount,skills};
}

function applyFate(s,f){
  if(!f)return;
  if(f.atkBonus)s.atk=Math.min(99,s.atk+f.atkBonus);
  if(f.defBonus)s.def=Math.min(99,s.def+f.defBonus);
  if(f.spdBonus)s.spd=Math.min(99,s.spd+f.spdBonus);
  if(f.lckBonus)s.lck=Math.min(99,s.lck+f.lckBonus);
  if(f.atkMalus)s.atk=Math.max(5,s.atk-f.atkMalus);
  if(f.defMalus)s.def=Math.max(5,s.def-f.defMalus);
  if(f.spdMalus)s.spd=Math.max(5,s.spd-f.spdMalus);
  if(f.lckMalus)s.lck=Math.max(5,s.lck-f.lckMalus);
}

  const el=document.getElementById('dept'+p);
  el.className='dept-card '+job.cls;
  el.innerHTML=`<span class="dept-icon">${job.icon}</span><div><div class="dept-name">${job.name}</div><div class="dept-desc">${job.desc}</div></div>`;
}

function renderCard(p,s){
  document.getElementById('av'+p).textContent=[...s.name][0];
  ['atk','def','spd','lck'].forEach(st=>{
    document.getElementById(st+p).textContent=s[st];
    document.getElementById(st+p+'-bar').style.width=s[st]+'%';
  });
  document.getElementById('hp'+p+'-val').textContent=Math.round(s.maxHp);
  document.getElementById('hp'+p+'-bar').style.width='100%';
  const tagsEl=document.getElementById('tags'+p); tagsEl.innerHTML='';
  const d=DEPT_MAP[s.dept];
  if(d){const sp=document.createElement('span');sp.className='tag tag-'+s.dept;sp.textContent=d.icon+' '+d.name;tagsEl.appendChild(sp);}
  const cn=document.createElement('span');cn.className='tag tag-neutral';cn.textContent=s.charCount+'字';tagsEl.appendChild(cn);
  const sv=document.createElement('span');sv.className='tag tag-neutral';sv.textContent='筆畫'+s.nameVal;tagsEl.appendChild(sv);

  const skEl=document.getElementById('skills'+p); skEl.innerHTML='';
  s.skills.forEach(sk=>{
    const div=document.createElement('div'); div.className='skill-item '+(sk.skillCls||'atk-skill');
    const cdTxt=sk.cooldown?`<span class="skill-cd">CD ${sk.cooldown}</span>`:'';
    const missTxt=sk.miss>0?`<span class="skill-cd">失手率 ${Math.round(sk.miss*100)}%</span>`:'';
    div.innerHTML=`<div class="skill-name-row"><span class="skill-name">${sk.name}</span><span class="skill-badge badge-${sk.badge}">${{atk:'攻擊',def:'防禦',spd:'減速',ult:'必殺'}[sk.badge]}</span>${cdTxt}${missTxt}</div><div class="skill-desc">${sk.desc}</div>`;
    skEl.appendChild(div);
  });
  document.getElementById('sn'+p).textContent=s.name;
}

function updateCard(p){
  const name=document.getElementById('name'+p).value.trim();
  document.getElementById('av'+p).textContent=name?[...name][0]:'？';
  if(name){const s=calcStats(name);renderCard(p,s);}
}

      collapsed[idx]=true;
      document.getElementById('card'+(idx+1)).classList.add(idx===0?'collapse-p1':'collapse-p2');
      addLog(`💥 ${stats.name} 進入【崩潰加班模式】！攻擊暴漲，防禦歸零，開始亂出招！`,'log-collapse');
      const col=document.getElementById('sCollapse');
      col.textContent=(col.textContent?col.textContent+' / ':'')+`${stats.name} 崩潰💥`;
    }
  }

  function pickSkill(stats,cds){
    if(cds[2]===0&&Math.random()<0.28){cds[2]=stats.skills[2].cooldown;return{sk:stats.skills[2],idx:2};}
    if(Math.random()<0.5&&cds[0]===0)return{sk:stats.skills[0],idx:0};
    if(cds[1]===0)return{sk:stats.skills[1],idx:1};
    return null;
  }

  addLog(`📬 ${n1} 抽到今日運勢：【${fate1.name}】${fate1.icon}`,'log-fate');
  await sleep(300);
  addLog(`📬 ${n2} 抽到今日運勢：【${fate2.name}】${fate2.icon}`,'log-fate');
  await sleep(300);
  addLog(`🏢 ${n1} 的職稱是「${s1.job.name}」，${n2} 的職稱是「${s2.job.name}」`,'log-fate');
  await sleep(400);
  addLog('── 職場決鬥開始 ──','log-sep');
  await sleep(400);

  let round=1;
  while(hp[0]>0&&hp[1]>0&&round<=20){
    await sleep(440);
    updateStatus(hp,s1,s2,round);
    const fl={};
    if(Math.random()<0.22){
      const ev=EVENTS[Math.floor(Math.random()*EVENTS.length)];
      ev.effect(s1,s2,hp,fl);
      updateHp(); updateStatus(hp,s1,s2,round);
      addLog(`⚡ 職場事件：${ev.text}`,'log-event');
      await sleep(400);
      if(hp[0]<=0||hp[1]<=0)break;
    }

    const order=s1.spd>=s2.spd?[[s1,s2,cds1,0,1],[s2,s1,cds2,1,0]]:[[s2,s1,cds2,1,0],[s1,s2,cds1,0,1]];
    let ti=0;
    for(const[atker,defer,acd,ai,di]of order){
      if(hp[0]<=0||hp[1]<=0)break;
      if(fl.skipCounter&&ti===1){addLog(`${defer.name} WiFi 斷線，無法反擊！`,'log-miss');ti++;continue;}
      ti++;
      acd.forEach((_,i)=>{if(acd[i]>0)acd[i]--;});
      const bonus=elBonus(atker,defer);
      const pick=pickSkill(atker,acd);
      const logCls=ai===0?'log-skill-p1':'log-skill-p2';
      const isCollapsed=collapsed[ai];
      const defCollapsed=collapsed[di];

      if(pick&&pick.sk.type!=='def'&&pick.sk.type!=='debuff'){
        const sk=pick.sk;
        let mr=sk.miss||0;
        if(fl.systemDown&&sk.badge!=='ult')mr=0.8;
        if(fl.urgentMail)mr=Math.min(0.9,mr+0.15);
        if(fl.fridayVibes)mr=Math.max(0,mr-0.1);
        if(Math.random()<mr){
          addLog(`第${round}回合  ${atker.name} 使出「${sk.name}」── 失手了！對方沒在看`,'log-miss');
          await sleep(280);continue;
        }
        const crit=Math.random()<(fl.doubleCrit?atker.lck/90:atker.lck/180);
        let mult=sk.mult;
        if(isCollapsed)mult*=1.8;
        const defFactor=defCollapsed?0:0.35;
        let dmg=Math.max(1,Math.round((atker.atk*mult-defer.def*defFactor)*bonus*(crit?1.7:1)*(0.88+Math.random()*0.25)));
        hp[di]-=dmg; updateHp();
        checkCollapse(di,[s1,s2][di],hp[di]);
        const extras=[crit?'【會心一擊】':'',bonus>1?'【部門剋制】':bonus<1?'【部門抵抗】':'',isCollapsed?'【崩潰爆發】':''].filter(Boolean).join(' ');
        updateStatus(hp,s1,s2,round);
        addLog(`第${round}回合  ${atker.name} 使出「${sk.name}」→ ${dmg} 傷害 ${extras}`,isCollapsed?'log-revenge':logCls);
        // 嘲諷台詞（60% 機率）
        if(Math.random()<0.6){
          await sleep(120);
          addLog(`　　${atker.name}：${getRandTaunt(atker.dept)}`,isCollapsed?'log-revenge':logCls);
        }
        if(isCollapsed&&Math.random()<0.35&&hp[di]>0){
          await sleep(200);
          const bd=Math.max(1,Math.round(atker.atk*0.6*(0.8+Math.random()*0.4)));
          hp[di]-=bd; updateHp();
          checkCollapse(di,[s1,s2][di],hp[di]);
          updateStatus(hp,s1,s2,round);
          addLog(`第${round}回合  ↳ ${atker.name} 連環出招！再追 ${bd} 傷害`,'log-revenge');
        }
        // 死亡台詞
        if(hp[di]<=0){
          await sleep(150);
          addLog(`　　${defer.name}：${getDeathLine(defer.dept)}`,'log-miss');
        }
      }else if(pick&&(pick.sk.type==='def'||pick.sk.type==='debuff')){
        const eff=pick.sk.type==='def'?'進入防守模式':'讓對手速度下降';
        addLog(`第${round}回合  ${atker.name} 使出「${pick.sk.name}」，${eff}！`,logCls);
      }else{
        const dodge=Math.random()<(isCollapsed?0:(fl.fridayVibes?defer.spd/200:defer.spd/320));
        if(dodge){
          addLog(`第${round}回合  ${defer.name} 裝作沒看到，成功閃避`,'log-atk');
          if(Math.random()<0.5){
            await sleep(100);
            addLog(`　　${defer.name}：「什麼事？我在開會。」`,'log-miss');
          }
        }
        else{
          const crit=Math.random()<(fl.doubleCrit?atker.lck/100:atker.lck/200);
          const defFactor=defCollapsed?0:0.4;
          let atkMult=isCollapsed?1.8:1;
          let dmg=Math.max(1,Math.round((atker.atk*atkMult-defer.def*defFactor)*bonus*(crit?1.8:1)*(0.85+Math.random()*0.3)));
          hp[di]-=dmg; updateHp();
          checkCollapse(di,[s1,s2][di],hp[di]);
          updateStatus(hp,s1,s2,round);
          addLog(`第${round}回合  ${atker.name} 普通出招 → ${dmg} 傷害${crit?' 【會心一擊】':''}${bonus>1?' 【剋制】':''}`,isCollapsed?'log-revenge':'log-atk');
          if(Math.random()<0.4){
            await sleep(100);
            addLog(`　　${atker.name}：${getRandTaunt(atker.dept)}`,isCollapsed?'log-revenge':'log-atk');
          }
          if(hp[di]<=0){
            await sleep(150);
            addLog(`　　${defer.name}：${getDeathLine(defer.dept)}`,'log-miss');
          }
        }
      }
      await sleep(300);
    }

    if(round<=2&&(hp[0]<=0||hp[1]<=0)){
      const di=hp[0]<=0?0:1;
      const ds=[s1,s2][di];
      if(!reviveUsed[di]){
        reviveUsed[di]=true;
        await sleep(500);
        const revHp=Math.round(ds.maxHp*0.4);
        hp[di]=revHp; updateHp(); updateStatus(hp,s1,s2,round);
        addLog(`✨ 奇蹟！${ds.name} 喝了一口咖啡，以 ${revHp} 體力重新爬起來繼續上班！`,'log-revive');
        await sleep(600);
      }
    }
    round++;
  }

  await sleep(500);
  addLog('── 職場決鬥結束 ──','log-sep');
  const banner=document.getElementById('resultBanner');
  const titleEl=document.getElementById('resultTitle');
  const subEl=document.getElementById('resultSub');
  const deptName=d=>(DEPT_MAP[d]?DEPT_MAP[d].name:'職場');
  if(hp[0]>hp[1]){
    titleEl.textContent=`🏆 ${n1} 獲勝！`;
    subEl.textContent=`剩餘體力 ${Math.round(hp[0])}｜${deptName(s1.dept)}的驕傲${collapsed[0]?' ｜ 崩潰反殺傳說✨':''}`;
    document.getElementById('card1').classList.add('winner');
  }else if(hp[1]>hp[0]){
    titleEl.textContent=`🏆 ${n2} 獲勝！`;
    subEl.textContent=`剩餘體力 ${Math.round(hp[1])}｜${deptName(s2.dept)}的驕傲${collapsed[1]?' ｜ 崩潰反殺傳說✨':''}`;
    document.getElementById('card2').classList.add('winner');
  }else{
    titleEl.textContent='🤝 平手收場';
    subEl.textContent='勢均力敵，建議兩人去喝一杯和解';
  }
  banner.classList.add('show');
  updateStatus(hp,s1,s2,null);
  window.scrollTo({top:0,behavior:'smooth'});
  battleRunning=false;
  document.getElementById('fightBtn').disabled=false;
}

updateCard(1);
updateCard(2);
</script>
</body>
</html>
